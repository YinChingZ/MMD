model_list:
  - model_name: mmd-fusion
    litellm_params:
      model: mmd/fusion
      analysis_models:
        - openai/gpt-4.1-mini
        - anthropic/claude-3-5-haiku
      coordinator_model: openai/gpt-4.1-mini
      preset: balanced
      mmd_mode: quick
      quorum_ratio: 0.66
      max_run_timeout: 180
      max_total_calls: 12
      max_repair_attempts: 2
      max_completion_tokens: 1200
      temperature: 0.4
      coordinator_temperature: 0.1
      model_params:
        extra_body:
          mmd_example: true
      return_trace: false

litellm_settings:
  custom_provider_map:
    - provider: mmd
      custom_handler: mmd_handler.mmd_custom_llm
