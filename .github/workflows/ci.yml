name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mmd
          POSTGRES_USER: mmd
          POSTGRES_PASSWORD: mmd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mmd -d mmd"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15

    env:
      DATABASE_URL: postgres://mmd:mmd@localhost:5432/mmd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run db:migrate --workspace=apps/api

      - run: npm run test
